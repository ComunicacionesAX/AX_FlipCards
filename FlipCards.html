<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asimetrix - Argumentos de Venta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face { font-family: 'SF Pro Display'; src: url('AX_Tipografía/SF-Pro-Display-Regular.otf') format('opentype'); font-weight: 400; }
        @font-face { font-family: 'SF Pro Display'; src: url('AX_Tipografía/SF-Pro-Display-Medium.otf') format('opentype'); font-weight: 500; }
        @font-face { font-family: 'SF Pro Display'; src: url('AX_Tipografía/SF-Pro-Display-Semibold.otf') format('opentype'); font-weight: 600; }
        @font-face { font-family: 'SF Pro Display'; src: url('AX_Tipografía/SF-Pro-Display-Bold.otf') format('opentype'); font-weight: 700; }
        @font-face { font-family: 'SF Pro Text'; src: url('AX_Tipografía/SF-Pro-Text-Regular.otf') format('opentype'); font-weight: 400; }
        @font-face { font-family: 'SF Pro Text'; src: url('AX_Tipografía/SF-Pro-Text-Medium.otf') format('opentype'); font-weight: 500; }
        * { box-sizing: border-box; }
        body { background: linear-gradient(135deg, #040833 0%, #005980 100%); min-height: 100vh; font-family: 'SF Pro Text', -apple-system, sans-serif; }
        .font-heading { font-family: 'SF Pro Display', sans-serif; }
        .perspective-1000 { perspective: 1000px; }
        .transform-style-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        .flip-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-inner { transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .flip-card:hover .card-inner { transform: translateY(-8px); }
        .flip-card.flipped:hover .card-inner { transform: rotateY(180deg) translateY(-8px); }
        .card-glow { box-shadow: 0 0 40px rgba(151, 244, 255, 0.1); }
        .card-front { background: linear-gradient(145deg, #040939 0%, #02315D 100%); border: 1px solid rgba(151, 244, 255, 0.2); }
        .card-back { background: linear-gradient(145deg, #02315D 0%, #040939 50%, #97F4FF 100%); border: 1px solid rgba(151, 244, 255, 0.3); }
        .tab-btn.active { background: #97F4FF; color: #040833; }
        .glass { background: rgba(4, 8, 57, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(151, 244, 255, 0.1); }
        .section { display: none; }
        .section.active { display: block; }
    </style>
</head>
<body class="bg-[#040833] min-h-screen">
    <header class="py-4 px-6 glass">
        <div class="max-w-7xl mx-auto">
            <div class="flex items-center justify-between flex-wrap gap-4 mb-4">
                <div class="flex items-center gap-4">
                    <img src="AX_Iconos/Vector.svg" alt="Asimetrix" class="w-10 h-10">
                    <div>
                        <h1 class="text-white font-heading font-bold text-xl">Asimetrix</h1>
                        <p class="text-[#97F4FF]/70 text-xs">Argumentos de venta</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="showSection('flipcards')" class="tab-btn active px-4 py-2 rounded-full text-sm font-medium transition-all" id="tab-flipcards">Flip Cards</button>
                    <button onclick="showSection('decir')" class="tab-btn px-4 py-2 rounded-full glass text-white text-sm font-medium transition-all" id="tab-decir">Qué decir y qué no decir</button>
                </div>
                <div class="flex items-center gap-3 glass px-4 py-2 rounded-full">
                    <span class="text-[#97F4FF] font-semibold" id="viewed-count">0</span>
                    <span class="text-[#97F4FF]/50">/</span>
                    <span class="text-white" id="total-count">0</span>
                    <span class="text-[#97F4FF]/70 text-sm ml-1">tarjetas</span>
                </div>
            </div>
        </div>
    </header>

    <!-- FLIP CARDS SECTION -->
    <main id="section-flipcards" class="section active max-w-7xl mx-auto px-6 py-6">
        <div class="mb-6">
            <div class="flex flex-wrap gap-2 mb-4" id="category-filters">
                <button class="tab-btn active px-4 py-1.5 rounded-full bg-[#97F4FF] text-[#040833] text-xs font-semibold transition-all" data-category="all">Todas</button>
                <button class="tab-btn px-4 py-1.5 rounded-full glass text-white text-xs font-medium transition-all" data-category="pigvision">PigVision</button>
                <button class="tab-btn px-4 py-1.5 rounded-full glass text-white text-xs font-medium transition-all" data-category="insylo">Insylo</button>
                <button class="tab-btn px-4 py-1.5 rounded-full glass text-white text-xs font-medium transition-all" data-category="nodos">Nodos</button>
                <button class="tab-btn px-4 py-1.5 rounded-full glass text-white text-xs font-medium transition-all" data-category="plataforma">Plataforma</button>
                <button class="tab-btn px-4 py-1.5 rounded-full glass text-white text-xs font-medium transition-all" data-category="general">General</button>
            </div>
            <div class="relative max-w-md">
                <input type="text" id="search-input" placeholder="Buscar por palabras clave..." class="w-full px-4 py-2 pl-10 rounded-lg glass text-white text-sm placeholder-[#97F4FF]/50 focus:outline-none focus:ring-1 focus:ring-[#97F4FF]">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[#97F4FF]/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4" id="cards-container"></div>
    </main>

    <!-- QUÉ DECIR SECTION -->
    <main id="section-decir" class="section max-w-7xl mx-auto px-6 py-6">
        <div class="mb-6">
            <div class="flex flex-wrap gap-2 mb-4" id="decir-filters">
                <button class="tab-btn active px-4 py-1.5 rounded-full bg-[#97F4FF] text-[#040833] text-xs font-semibold transition-all" data-value="all">Todos</button>
                <button class="tab-btn px-4 py-1.5 rounded-full glass text-white text-xs font-medium transition-all" data-value="pigvision">PigVision</button>
                <button class="tab-btn px-4 py-1.5 rounded-full glass text-white text-xs font-medium transition-all" data-value="insylo">Insylo</button>
                <button class="tab-btn px-4 py-1.5 rounded-full glass text-white text-xs font-medium transition-all" data-value="nodos">Nodos</button>
                <button class="tab-btn px-4 py-1.5 rounded-full glass text-white text-xs font-medium transition-all" data-value="plataforma">Plataforma</button>
            </div>
            <div class="relative max-w-md">
                <input type="text" id="search-decir" placeholder="Buscar..." class="w-full px-4 py-2 pl-10 rounded-lg glass text-white text-sm placeholder-[#97F4FF]/50 focus:outline-none focus:ring-1 focus:ring-[#97F4FF]">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[#97F4FF]/50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
        </div>
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-4" id="decir-container"></div>
    </main>

    <footer class="py-6 px-6 glass mt-8">
        <div class="max-w-7xl mx-auto text-center">
            <p class="text-[#97F4FF]/50 text-xs">Asimetrix © 2026 - Herramienta de ventas interna</p>
        </div>
    </footer>

    <script>
        // FLIP CARDS DATA
        const cardsData = [
            { id: 1, category: "pigvision", usuario: "galponero", question: "Yo ya sé cuánto pesan mis cerdos, no necesito una cámara para eso.", answer: "Mire, yo no vengo a decirle que usted no sabe pesar. Usted lleva años en esto y conoce sus cerdos como la palma de su mano. Lo que pasa es que a veces uno tiene la corazonada de que un lote está bajito, pero no tiene cómo probarlo. Con la cámara usted puede decir: 'mire, mis cerdos están pesando 62 kilos cuando deberían estar en 70'. Eso no es para reemplazar su ojo, es para que cuando usted diga 'algo no anda bien', tenga el respaldo." },
            { id: 2, category: "pigvision", usuario: "galponero", question: "Es que eso de configurar me queda lejos, soy malo con la tecnología.", answer: "Imagínese el celular desde que lo tuvo. Al principio le dio guerra, ¿verdad? Y ahora lo maneja mejor que cualquiera. Con PigVision pasa igual: se configura una vez y ya. Si tiene dudas, nosotros lo acompañamos." },
            { id: 3, category: "pigvision", usuario: "galponero", question: "¿Y si se me dañó la cámara? ¿Qué hago?", answer: "Tiene un año de garantía. Y si se daña, lo cambiamos sin costo. Es un equipo muy sencillo." },
            { id: 4, category: "pigvision", usuario: "galponero", question: "Mi patrón me va a decir que para qué quiero eso si siempre hemos pesado a ojo.", answer: "Le voy a contar algo: en una granja de Córdoba, el galponero le propuso al dueño probar la cámara. El dueño dijo lo mismo que usted. Pero el galponero le mostró que podía saber el peso sin meter los cerdos a la báscula. El dueño terminó diciendo: '¿por qué no trajimos esto antes?'." },
            { id: 5, category: "pigvision", usuario: "galponero", question: "Suena complicado, mejor lo que hacíamos antes.", answer: "Yo le explico en dos minutos: la cámara se cuelga, se enchufa, se conecta al wifi y ya está. No tiene que hacer nada más. Ella sola pesa y le muestra los datos en su celular." },
            { id: 6, category: "pigvision", usuario: "tecnico", question: "Ya tengo suficiente con mantener los otros equipos, no necesito otra cosa que falle.", answer: "La diferencia con PigVision es que se configura una vez y después usted casi no tiene que tocarla. Ella sola está ahí, pesando, mandando datos." },
            { id: 7, category: "pigvision", usuario: "tecnico", question: "Es que los datos no son confiables.", answer: "Le voy a ser honesto: nada es perfecto. Pero le cuento: en una granja en Antioquia hicieron una prueba: pesaron 100 cerdos en la báscula y compararon con lo que marcaba la cámara. Estaban a menos de dos kilos de diferencia." },
            { id: 8, category: "pigvision", usuario: "tecnico", question: "¿Y cómo se integra con lo que ya tengo?", answer: "Tenemos API, así que si su granja ya tiene un sistema, podemos conectarlo. Y si no tiene nada, el panel de PigVision ya le sirve." },
            { id: 9, category: "pigvision", usuario: "tecnico", question: "No tengo tiempo para configurar una cosa nueva.", answer: "¿Cuánto tiempo invierte al día en pesar, en anotar, en hacer cuentas? Con PigVision eso se reduce a casi cero. Usted llega, abre el celular y ya tiene los números." },
            { id: 10, category: "pigvision", usuario: "dueno", question: "Suena interesante, pero no tengo tiempo de aprender algo nuevo.", answer: "Usted no tiene que aprender nada. Sus galponerosinstalan la cámara, usted abre su celular y ya." },
            { id: 11, category: "pigvision", usuario: "dueno", question: "¿Y cuánto cuesta? Porque siempre son caros estos aparatitos.", answer: "Depende del tamaño de la granja. Pero le digo honesto: la cámara se paga sola en el primer lote. Si tiene 500 cerdos y no sabe si pesan 70 u 80 kilos, eso es una diferencia enorme en plata." },
            { id: 12, category: "pigvision", usuario: "dueno", question: "Mis galponeros no van a saber usarla.", answer: "Se lo cuento como experiencia: en una granja en el Valle, los galponeros eran todos mayores, ninguno con tecnología. Les dio la cámara y en dos días estaban revendola. Son más fáciles de usar que un celular." },
            { id: 13, category: "pigvision", usuario: "dueno", question: "Llevo 20 años pesando a ojo y me ha ido bien.", answer: "Y está muy bien, no lo cuestiono. Lo que pasa es que el ojo funciona hasta cierto punto. Cuando tiene 50 cerdos los conoce a todos, pero cuando tiene 500 ya no. La cámara le da visibilidad." },
            { id: 14, category: "pigvision", usuario: "dueno", question: "Necesito ver que esto realmente funciona antes de meter plata.", answer: "Perfecto, totalmente entiendo. Podemos hacer una prueba en un galpón, con un lote, para que vea los resultados. Sin compromiso." },
            { id: 15, category: "pigvision", usuario: "hijo", question: "Mi papá dice que eso es plata tirada.", answer: "Si usted pone la cámara y puede mostrarle: 'mire, tenemos 200 cerdos que deberían pesar 80 y están en 65', ¿qué le dice? Eso no es opinión, son números." },
            { id: 16, category: "pigvision", usuario: "hijo", question: "Es que siempre hemos hecho las cosas así y funciona.", answer: "Las granjas que van a durar son las que se adaptan. No se trata de cambiar todo, se trata de tener herramientas que le ayuden a tomar mejores decisiones." },
            { id: 17, category: "pigvision", usuario: "hijo", question: "No quiero estar pendiente de una cosa más.", answer: "Y no tiene que estar pendiente. La cámara hace su trabajo sola. Lo único que tiene que hacer es abrir el celular y ver los números." },
            { id: 18, category: "pigvision", usuario: "hijo", question: "¿Y si lo pongo y no funciona? Me van a culpar a mí.", answer: "Si usted propone algo y funciona, queda bien. Y además, podemos hacer una prueba pequeña primero, en un solo galpón. Sin arriesgar todo." },
            { id: 19, category: "pigvision", usuario: "lider", question: "¿Cómo sé que esto realmente genera retorno?", answer: "Le pongo un ejemplo fácil: ¿cuántos cerdos tiene? ¿Cuánto le cuesta alimentarlos? Si usted no sabe exactamente cuánto pesan, puede estar alimentando cerdos que ya deberían haber salido." },
            { id: 20, category: "pigvision", usuario: "lider", question: "Ya invierto en muchas cosas, ¿por qué una cámara más?", answer: "No es una cámara más, es una herramienta que le da información. Y con información correcta, las decisiones son mejores." },
            { id: 21, category: "pigvision", usuario: "lider", question: "Necesito ver integración con mis sistemas.", answer: "Tenemos API, así que podemos conectarlo a lo que ya tiene." },
            { id: 22, category: "insylo", usuario: "galponero", question: "Yo siempre sé cuándo va a hacer falta, no necesito una máquina.", answer: "Y seguro que sí, usted conoce sus silos mejor que nadie. Lo que pasa es que a veces uno calcula y resulta que el concentrado duraba menos de lo que pensaba. Con Insylo usted tiene la fecha exacta de cuándo tiene que pedir." },
            { id: 23, category: "insylo", usuario: "galponero", question: "Es que subirse al silo es peligroso, pero ya estoy acostumbrado.", answer: "Exacto, y eso es precisamente lo que queremos evitarle. Con Insylo se acaba eso. Desde el celular mira y ya sabe." },
            { id: 24, category: "insylo", usuario: "galponero", question: "¿Y si se va la luz o el internet?", answer: "El sistema funciona con pilas, así que aunque se vaya la luz, sigue funcionando. Y no necesita internet para medir." },
            { id: 25, category: "insylo", usuario: "galponero", question: "Nadie me ha pedido eso, para qué lo voy a tener.", answer: "Si usted le puede decir a su jefe 'el alimento llega el jueves' con certeza, en lugar de 'creo que dura hasta la semana que viene', ¿quién no va a querer eso?" },
            { id: 26, category: "insylo", usuario: "tecnico", question: "Yo tengo un Excel con las fechas, me funciona.", answer: "El Excel está muy bien. Lo que pasa es que con Insylo tiene los datos en tiempo real. No tiene que actualizarlo, no tiene que acordarse de revisar." },
            { id: 27, category: "insylo", usuario: "tecnico", question: "Es que el problema no es saber cuánto hay, el problema es que no me hacen caso cuando digo que hay que pedir.", answer: "Si usted tiene los datos en el celular y puede mostrar: 'mire, el silo está en 15%, tiene que pedir', es más difícil que le digan que no." },
            { id: 28, category: "insylo", usuario: "tecnico", question: "¿Y cómo se entera el proveedor?", answer: "El sistema le puede mandar la alerta a usted, al proveedor, a quien usted quiera." },
            { id: 29, category: "insylo", usuario: "dueno", question: "El alimento es mi gasto más grande, pero siempre ha funcionado así.", answer: "Si usted pudiera pedir el alimento con una semana de anticipación en lugar de tres días, ¿cuánto ahorraría en flete?" },
            { id: 30, category: "insylo", usuario: "dueno", question: "Si mis empleados me dicen que falta, pido. No necesito un sensor.", answer: "Sus empleados hacen su trabajo. Pero a veces se olvida, a veces no cuentan bien. El sensor no se olvida, no se distrae." },
            { id: 31, category: "insylo", usuario: "dueno", question: "¿Y el sensor se daña? Porque eso es plata perdida.", answer: "Tiene un año de garantía. Y si se daña, lo cambiamos sin costo." },
            { id: 32, category: "insylo", usuario: "hijo", question: "Yo no estoy en eso, mi papá lo maneja.", answer: "Si usted puede mostrarle: 'mire, en los últimos tres meses gastamos X en concentrado y podríamos haber gastado menos', eso es demostrar que puede aportar." },
            { id: 33, category: "insylo", usuario: "hijo", question: "¿Para qué quiero saber del alimento si no soy yo quien compra?", answer: "El alimento es el 70% del costo de la granja. Si usted sabe exactamente cuánto entra y cuánto sale, puede proponer mejoras." },
            { id: 34, category: "insylo", usuario: "lider", question: "El alimento fluctúa mucho, es difícil presupuestar.", answer: "Si usted tiene los datos de consumo de los últimos seis meses, puede proyectar con certeza." },
            { id: 35, category: "insylo", usuario: "lider", question: "¿Cómo me aseguro de que el sensor sea preciso?", answer: "El sensor tiene más del 99% de precisión. Y lo puede verificar: baje, mire el nivel real y compare." },
            { id: 36, category: "insylo", usuario: "lider", question: "¿Tienen algo que se integre con mi sistema contable?", answer: "Tenemos API, así que podemos conectarlo." },
            { id: 37, category: "nodos", usuario: "galponero", question: "Yo siento cuando hace calor o frío, no necesito un sensor.", answer: "Y seguro que sí, usted conoce sus cerdos. Lo que pasa es que a veces el problema no se siente: el amoníaco no tiene olor fuerte, la humedad no se ve." },
            { id: 38, category: "nodos", usuario: "galponero", question: "Los cerdos me dicen si están incómodos.", answer: "Los cerdos son muy buenos indicadores, pero hay cosas que pasan antes de que ellos muestren. El sensor le avisa antes, no después." },
            { id: 39, category: "nodos", usuario: "galponero", question: "Es que eso ya lo reviso yo.", answer: "Cuando está en el galpón tres, ¿qué pasa con el uno? Los sensores están ahí todo el tiempo, día y noche." },
            { id: 40, category: "nodos", usuario: "tecnico", question: "Yo ya sé qué condiciones necesita cada etapa.", answer: "'Saber' y 'poder demostrar' son cosas diferentes. Si usted le dice al jefe 'la temperatura estaba mala', ¿qué le responde? Con el sensor le muestra los datos." },
            { id: 41, category: "nodos", usuario: "tecnico", question: "Si tengo que estar pendiente de un sensor más, no termino.", answer: "No es un sensor más, es un respaldo. Usted no tiene que hacer nada con él, él solo mide y le avisa si algo está mal." },
            { id: 42, category: "nodos", usuario: "tecnico", question: "¿Y cómo sé que los datos son reales?", answer: "Los sensores están calibrados de fábrica. Y además, usted puede compararlos con un termómetro normal." },
            { id: 43, category: "nodos", usuario: "dueno", question: "El ambiente siempre ha sido así, no le meto plata a eso.", answer: "Si usted tiene 1.000 cerdos y la temperatura está dos grados más alta de lo que debería, ¿cuánto está perdiendo en comida?" },
            { id: 44, category: "nodos", usuario: "dueno", question: "¿Y qué voy a hacer con un sensor? Mis empleados no lo van a usar.", answer: "No necesitan usarlo, el sensor funciona solo. Lo que necesitan es recibir la alerta cuando algo está mal." },
            { id: 45, category: "nodos", usuario: "dueno", question: "Son muchos sensores, ¿para qué?", answer: "Con dos o tres sensores alcanza para un galpón. No es mucho. Y se instalan en diez minutos." },
            { id: 46, category: "nodos", usuario: "hijo", question: "¿Realmente hace falta? Yo creo que con lo que hay alcanza.", answer: "Si sus cerdos están en un ambiente que no es óptimo, está perdiendo plata." },
            { id: 47, category: "nodos", usuario: "hijo", question: "¿Y eso cuánto cuesta?", answer: "Mucho menos de lo que pierde si no lo tiene. Una granja perdió 30 cerdos en una semana por un problema de ventilación." },
            { id: 48, category: "nodos", usuario: "lider", question: "El ambiente no es algo en lo que invierta normalmente.", answer: "No es una inversión en ambiente, es una inversión en no perder plata." },
            { id: 49, category: "nodos", usuario: "lider", question: "¿Cómo mido el retorno de un sensor?", answer: "Si usted tiene 1.000 cerdos y la temperatura baja la conversión en un 5%, ¿cuánto pierde?" },
            { id: 50, category: "plataforma", usuario: "galponero", question: "Yo con el celular ya estoy bien, para qué tanto.", answer: "No tiene que aprender nada nuevo. Es como cuando pone todas sus apps de trabajo en una carpeta: todo está ahí, pero no tiene que aprender nada, solo abrir." },
            { id: 51, category: "plataforma", usuario: "galponero", question: "Es que eso es para los que saben de números.", answer: "No, al contrario. Mientras más simple, mejor. La plataforma le confirma lo que usted ve." },
            { id: 52, category: "plataforma", usuario: "tecnico", question: "Ya tengo muchos sistemas, no quiero otro más.", answer: "No es otro sistema, es el mismo pero integrado. En lugar de abrir cuatro programas, abre uno." },
            { id: 53, category: "plataforma", usuario: "tecnico", question: "¿Y cómo se integra con lo que tengo?", answer: "Tenemos API. Si ya tiene algo, lo conectamos." },
            { id: 54, category: "plataforma", usuario: "dueno", question: "No tengo tiempo de meterme en un sistema.", answer: "No tiene que meterse, eso es lo bueno. Usted recibe los reportes, ve los indicadores importantes y ya." },
            { id: 55, category: "plataforma", usuario: "dueno", question: "¿Y qué pasa si no tengo internet?", answer: "Funciona offline también. Los datos se guardan local y cuando vuelva la conexión se sincroniza." },
            { id: 56, category: "plataforma", usuario: "dueno", question: "¿Quién me enseña a usar eso?", answer: "Nosotros. Le damos una capacitación de 30 minutos y listo." },
            { id: 57, category: "plataforma", usuario: "hijo", question: "¿Y eso es difícil de manejar?", answer: "Es más fácil que Instagram. Tiene gráficos, colores, cosas claras." },
            { id: 58, category: "plataforma", usuario: "hijo", question: "¿Le puedo dar acceso a mi papá para que vea?", answer: "Sí, claro. Cada persona tiene su usuario y sus permisos." },
            { id: 59, category: "plataforma", usuario: "lider", question: "¿Se integra con mi sistema contable?", answer: "Tenemos API, así que lo conectamos a lo que tenga." },
            { id: 60, category: "plataforma", usuario: "lider", question: "¿Cómo sé que la tecnología está dando retorno?", answer: "La plataforma le muestra los indicadores clave. Cuánto pesan los cerdos, cuánto comen, cuánto le cuesta." },
            { id: 61, category: "general", usuario: "dueno", question: "Está muy caro", answer: "Si usted tiene 500 cerdos y no sabe exactamente cuándo pesar, puede estar alimentando 50 que ya deberían haber salido. Una semana de más son millones en comida." },
            { id: 62, category: "general", usuario: "dueno", question: "Funciona sin problema", answer: "Lo que le propongo es una prueba: en un solo galpón, con un lote, sin compromiso." },
            { id: 63, category: "general", usuario: "galponero", question: "No tengo tiempo", answer: "En lugar de pasar tiempo pesando, revisando silos, anotando, usted recupera ese tiempo. Es menos trabajo, no más." },
            { id: 64, category: "general", usuario: "dueno", question: "Mi gente no lo va a usar", answer: "En las granjas donde lo hemos puesto, los galponeros lo aprenden en dos días." },
            { id: 65, category: "general", usuario: "dueno", question: "Ya tengo un proveedor", answer: "Lo que le propongo es que nos comparen. Vea lo que tiene y vea lo que le ofrezco." },
            { id: 66, category: "general", usuario: "galponero", question: "No entiendo de tecnología", answer: "No tiene que entender de tecnología. Nosotros lo instalamos, lo configuramos, y después usted solo mira." }
        ];

        // QUÉ DECIR DATA
        const decirData = [
            { producto: "pigvision", no: "PigVision es un sistema de visión artificial basado en algoritmos de deep learning.", si: "Es una cámara que pesa cerdos automáticamente." },
            { producto: "pigvision", no: "Te permite obtener el peso promedio diario con una precisión del 97%.", si: "Le dice cuánto pesan sus cerdos sin tener que meterlos a la báscula." },
            { producto: "pigvision", no: "Configuración sugerida: 6 cámaras por galpón en 6 corrales diferentes.", si: "Con dos o tres cámaras alcanza para un galpón. Se instalan una vez y ya." },
            { producto: "pigvision", no: "El sistema te alerta sobre anomalías en las curvas de crecimiento.", si: "Si sus cerdos dejan de ganar peso, la cámara se lo avisa." },
            { producto: "pigvision", no: "PigVision le ofrece un ROI claro y rápido con visibilidad total de su producción.", si: "En el primer lote ya ve si le sirve. No tiene que esperar meses." },
            { producto: "pigvision", no: "Controle remotamente la producción desde su smartphone.", si: "Desde su celular ve cómo van los cerdos, sin tener que estar en el galpón." },
            { producto: "pigvision", no: "Demuestre ROI a su padre con métricas irrefutables.", si: "Le muestra a su viejo los números claros. Sin opiniones, sin discusiones." },
            { producto: "pigvision", no: "Integre los datos de crecimiento con su modelo de costos de producción.", si: "Le conectamos los datos de los cerdos con sus números de gastos." },
            { producto: "insylo", no: "Insylo es un sistema de monitoreo de inventario de silos basado en sensores IoT.", si: "Es un sensor que le dice cuánto alimento tiene en el silo, sin subir." },
            { producto: "insylo", no: "Monitoreo remoto del nivel de grano con alertas predictivas.", si: "Le avisa antes de que se termine para que pida a tiempo." },
            { producto: "insylo", no: "Sistema autónomo que no requiere conectividad constante.", si: "Funciona con pilas, no necesita internet, no se queda pegado." },
            { producto: "insylo", no: "Reduce el riesgo operativo de ascender a los silos.", si: "Ya no tiene que subirse a mirar, lo hace desde el celular." },
            { producto: "insylo", no: "Optimización del gasto en alimento, el mayor costo operativo.", si: "El concentrado es lo que más le sale. El sensor le ayuda a no pagar de más." },
            { producto: "insylo", no: "Visibilidad en tiempo real del inventario.", si: "Desde su celular ve cuánto tiene en cada silo." },
            { producto: "insylo", no: "Control digital del costo más grande de la granja.", si: "Sepa exactamente en qué se va la mayor parte de su plata." },
            { producto: "insylo", no: "Visibilidad en tiempo real del inventario, el costo más volátil.", si: "El concentrado fluctúa, pero usted puede saber con certeza cuánto entra y sale." },
            { producto: "nodos", no: "Monitoreo en tiempo real de temperatura, humedad, CO2, amoníaco y luz.", si: "Le dice si el galpón está bien, incluso cuando no está." },
            { producto: "nodos", no: "Sensor que detecta problemas invisibles antes de que enfermen los cerdos.", si: "Le avisa antes de que los cerdos se enfermen." },
            { producto: "nodos", no: "Alertas instantáneas cuando las condiciones superan los niveles seguros.", si: "Si algo está mal, le llega una alerta al celular." },
            { producto: "nodos", no: "Detecte riesgos invisibles como amoníaco y CO2 antes de que generen pérdidas.", si: "Hay cosas que no se ven ni se sienten, pero afectan a los cerdos." },
            { producto: "nodos", no: "Póliza contra las pérdidas invisibles por ambiente.", si: "Si el ambiente está mal, usted pierde plata sin saber por qué." },
            { producto: "nodos", no: "Bienestar animal medible y demostrable.", si: "Tiene cómo probar que sus cerdos están bien." },
            { producto: "nodos", no: "Automatización de la vigilancia 24/7.", si: "El sistema vela por sus cerdos todo el día, hasta cuando usted no está." },
            { producto: "plataforma", no: "Plataforma integrada que consolida todos los datos de sus sensores.", si: "Todo lo de sus cerdos en una sola pantalla." },
            { producto: "plataforma", no: "Tecnología que funciona, simple y confiable.", si: "No tiene que aprenderse un programa nuevo." },
            { producto: "plataforma", no: "Consolida datos de PigVision, Insylo y Nodos Ambientales.", si: "Todo lo que mide, en un solo lugar." },
            { producto: "plataforma", no: "Centro de mando único con visión estratégica.", si: "Todo lo de su granja, en una sola pantalla." },
            { producto: "plataforma", no: "Controle el negocio desde cualquier lugar.", si: "Desde su celular ve todo, sin estar ahí." },
            { producto: "plataforma", no: "ROI medible de la infraestructura.", si: "Tiene números para decir si la inversión vale la pena." }
        ];

        let viewedCards = new Set();
        let currentCategory = 'all';

        function getUsuarioLabel(usuario) {
            const labels = { galponero: "Galponero", tecnico: "Técnico", dueno: "Dueño", hijo: "Hijo", lider: "Líder" };
            return labels[usuario] || usuario;
        }

        function getProductoLabel(val) {
            const labels = { pigvision: 'PigVision', insylo: 'Insylo', nodos: 'Nodos', plataforma: 'Plataforma' };
            return labels[val] || val;
        }

        // FLIP CARDS
        function createCard(card) {
            return `<div class="flip-card cursor-pointer perspective-1000 h-72" data-category="${card.category}" data-usuario="${card.usuario}" data-id="${card.id}" data-question="${card.question.toLowerCase()}" data-answer="${card.answer.toLowerCase()}" onclick="flipCard(this)">
                <div class="card-inner relative w-full h-full transform-style-3d">
                    <div class="card-front absolute inset-0 backface-hidden rounded-xl p-4 card-glow flex flex-col">
                        <div class="flex flex-wrap gap-1.5 mb-2">
                            <span class="px-2 py-0.5 rounded bg-[#97F4FF]/20 text-[#97F4FF] text-[9px] font-semibold uppercase">${card.category}</span>
                            <span class="px-2 py-0.5 rounded bg-white/10 text-white/70 text-[9px] font-medium">${getUsuarioLabel(card.usuario)}</span>
                        </div>
                        <div class="flex-1 flex items-center justify-center"><p class="text-white font-heading font-semibold text-sm text-center leading-relaxed px-1">${card.question}</p></div>
                        <div class="text-center mt-2"><span class="text-[#97F4FF]/60 text-[10px]">Ver respuesta</span></div>
                    </div>
                    <div class="card-back absolute inset-0 backface-hidden rotate-y-180 rounded-xl p-4 flex flex-col">
                        <div class="mb-2"><span class="text-white font-semibold text-[10px]">Respuesta sugerida</span></div>
                        <div class="flex-1 flex items-center overflow-hidden"><p class="text-white/90 text-[11px] leading-relaxed">${card.answer}</p></div>
                        <div class="text-center mt-2 pt-2 border-t border-white/10"><span class="text-[#97F4FF] text-[10px]">Volver</span></div>
                    </div>
                </div>
            </div>`;
        }

        function flipCard(element) {
            element.classList.toggle('flipped');
            const cardId = element.dataset.id;
            if (!viewedCards.has(cardId)) { viewedCards.add(cardId); updateCounter(); }
        }

        function updateCounter() { document.getElementById('viewed-count').textContent = viewedCards.size; }

        function filterCards(category) {
            currentCategory = category;
            const cards = document.querySelectorAll('#cards-container .flip-card');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            cards.forEach(card => {
                const matchesCategory = category === 'all' || card.dataset.category === category;
                const matchesSearch = searchTerm === '' || card.dataset.question.includes(searchTerm) || card.dataset.answer.includes(searchTerm);
                card.style.display = (matchesCategory && matchesSearch) ? 'block' : 'none';
            });
        }

        // QUÉ DECIR
        function createDecirCard(item) {
            return `<div class="glass rounded-xl p-4" data-producto="${item.producto}">
                <div class="flex flex-wrap gap-1.5 mb-2">
                    <span class="px-2 py-0.5 rounded bg-[#97F4FF]/20 text-[#97F4FF] text-[9px] font-semibold uppercase">${getProductoLabel(item.producto)}</span>
                </div>
                <div class="space-y-1.5 text-[11px]">
                    <div class="flex gap-2">
                        <span class="text-red-400 font-semibold shrink-0">NO:</span>
                        <span class="text-white/50">${item.no}</span>
                    </div>
                    <div class="flex gap-2">
                        <span class="text-green-400 font-semibold shrink-0">SÍ:</span>
                        <span class="text-white">${item.si}</span>
                    </div>
                </div>
            </div>`;
        }

        function filterDecir() {
            const active = document.querySelector('#decir-filters .active').dataset.value;
            const search = document.getElementById('search-decir').value.toLowerCase();
            document.querySelectorAll('#decir-container > div').forEach(card => {
                const match = active === 'all' || card.dataset.producto === active;
                const searchMatch = search === '' || card.innerText.toLowerCase().includes(search);
                card.style.display = (match && searchMatch) ? 'block' : 'none';
            });
        }

        // TABS
        function showSection(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + section).classList.add('active');
            
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'bg-[#97F4FF]', 'text-[#040833]');
                b.classList.add('glass', 'text-white');
            });
            
            const activeTab = document.getElementById('tab-' + section);
            activeTab.classList.add('active', 'bg-[#97F4FF]', 'text-[#040833]');
            activeTab.classList.remove('glass', 'text-white');
        }

        // INIT
        document.getElementById('cards-container').innerHTML = cardsData.map(createCard).join('');
        document.getElementById('total-count').textContent = cardsData.length;
        document.getElementById('decir-container').innerHTML = decirData.map(createDecirCard).join('');

        document.getElementById('search-input').addEventListener('input', () => filterCards(currentCategory));
        
        document.querySelectorAll('#category-filters .tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#category-filters .tab-btn').forEach(b => {
                    b.classList.remove('active', 'bg-[#97F4FF]', 'text-[#040833]');
                    b.classList.add('glass', 'text-white');
                });
                this.classList.add('active', 'bg-[#97F4FF]', 'text-[#040833]');
                this.classList.remove('glass', 'text-white');
                filterCards(this.dataset.category);
            });
        });

        document.querySelectorAll('#decir-filters .tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('#decir-filters .tab-btn').forEach(b => {
                    b.classList.remove('active', 'bg-[#97F4FF]', 'text-[#040833]');
                    b.classList.add('glass', 'text-white');
                });
                this.classList.add('active', 'bg-[#97F4FF]', 'text-[#040833]');
                this.classList.remove('glass', 'text-white');
                filterDecir();
            });
        });

        document.getElementById('search-decir').addEventListener('input', filterDecir);
    </script>
</body>
</html>
